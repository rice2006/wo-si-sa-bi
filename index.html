<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張駿甫｜個人作品集</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/scripts.js"></script>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">張駿甫</div>
    <div class="menu">
        <a href="#home">首頁</a>
        <a href="#about">介紹</a>
        <a href="#interest">興趣</a>
        <a href="#work">作品</a>
    </div>
</nav>

<!-- HERO -->
<section id="home" class="hero">
    <h1>張駿甫</h1>
    <p>Digital Artist · Illustrator · Animation Lover</p>
    <a class="btn" href="#about">開始探索</a>
</section>

<!-- ABOUT -->
<section id="about" class="section">
    <div class="card">
        <h2>關於我</h2>
        <p>來自台灣的創作者，喜歡繪畫、角色設計與動畫。</p>
    </div>

    <div class="card">
        <h2>技能</h2>

        <p>烹飪</p>
        <div class="bar"><div style="width:85%"></div></div>

        <p>繪圖</p>
        <div class="bar"><div style="width:90%"></div></div>

        <p>體育</p>
        <div class="bar"><div style="width:70%"></div></div>
    </div>
</section>

<!-- INTEREST -->
<section id="interest" class="grid">

    <div class="card">
        <img src="images/interest1.jpg">
        <h3>繪畫</h3>
    </div>

    <div class="card">
        <img src="images/interest2.jpg">
        <h3>電影</h3>
    </div>

    <div class="card">
        <img src="images/interest3.jpg">
        <h3>影集</h3>
    </div>

    <div class="card">
        <img src="images/interest4.jpg">
        <h3>動畫</h3>
    </div>

</section>

<!-- WORK -->
<section id="work" class="gallery">

    <img src="images/artwork1.jpg" onclick="openImg(this)">
    <img src="images/artwork2.jpg" onclick="openImg(this)">
    <img src="images/artwork3.jpg" onclick="openImg(this)">
    <img src="images/artwork4.jpg" onclick="openImg(this)">
    <img src="images/artwork5.jpg" onclick="openImg(this)">
    <img src="images/artwork6.jpg" onclick="openImg(this)">

</section>

<!-- LIGHTBOX -->
<div id="modal" onclick="closeImg()">
    <img id="modalImg">
</div>

<script src="js/script.js"></script>
</body>
</html>
